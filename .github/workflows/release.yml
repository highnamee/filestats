name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build binaries and update formula
        run: bash scripts/release.sh "${{ github.event.inputs.version }}"

      - name: Push commit and tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          git push origin HEAD:main "v${VERSION}"

      - name: Create GitHub release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          gh release create "v${VERSION}" dist/filestats-* --title "v${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping tap update"
            exit 0
          fi
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          gh repo clone highnamee/homebrew-filestats tap
          cp Formula/filestats.rb tap/Formula/filestats.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/highnamee/homebrew-filestats.git"
          git add Formula/filestats.rb
          git commit -m "filestats v${VERSION}"
          git push
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
